<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackbox-Enterprises</title>
<meta name="description" content="Blackbox-Enterprises — Enterprise solutions">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://images.blackroad.io/brand/favicon.png">
<style>*{margin:0;padding:0;box-sizing:border-box}html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}:root{--g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--g135:linear-gradient(135deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--bg:#000;--border:#1a1a1a;--sub:#999;--dim:#333;--sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace}body{background:var(--bg);color:#f5f5f5;font-family:var(--sg);overflow-x:hidden;padding-bottom:56px}.grad-bar{height:4px;background:var(--g)}.container{max-width:100%;margin:0 auto;padding:32px 16px 0}.section{margin-bottom:40px}.section-label{font-family:var(--jb);font-size:10px;font-weight:500;color:var(--sub);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}.title{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}.subtitle{font-size:13px;color:#aaa;margin-bottom:32px}.mark{width:24px;height:3px;border-radius:2px;background:var(--g);margin-bottom:16px}.card{border:1px solid var(--border);border-radius:10px;padding:16px;background:#0a0a0a;transition:border-color .2s;margin-bottom:10px}.card:hover{border-color:var(--dim)}.card.no-click{cursor:default}.stat-val{font-size:22px;font-weight:700;color:#fff}.stat-label{font-family:var(--jb);font-size:9px;color:#aaa;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}.dot-live{background:var(--g135)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.pulse{animation:pulse 2s infinite}.circle-accent{width:8px;height:8px;border-radius:50%;background:var(--g135);display:inline-block}.grid-3{display:grid;gap:10px;margin-bottom:16px;grid-template-columns:repeat(3,1fr)}.repo-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);text-decoration:none;transition:background .15s}.repo-item:last-child{border-bottom:none}.repo-item:hover{background:#0d0d0d}.repo-name{font-size:12px;color:#ccc;font-weight:500;flex:1}.repo-desc{font-size:10px;color:#666;flex:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.repo-lang{font-family:var(--jb);font-size:9px;color:#888}.search{width:100%;padding:10px 14px;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;color:#ddd;font-size:13px;font-family:var(--sg);outline:none;margin-bottom:12px}.search:focus{border-color:#333}.search::placeholder{color:#555}
.widget-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}.widget{border:1px solid var(--border);border-radius:12px;padding:16px;background:#0a0a0a;position:relative;min-height:90px;display:flex;flex-direction:column}.widget:hover{border-color:var(--dim)}.widget-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:10px;background:#111;border:1px solid var(--border)}.widget-name{font-size:12px;font-weight:600;color:#ddd;margin-bottom:2px}.widget-desc{font-family:var(--jb);font-size:9px;color:#888}.widget-link{position:absolute;inset:0;border-radius:12px;z-index:1}
@media(min-width:600px){.container{padding:40px 24px 0;max-width:880px}.widget-grid{grid-template-columns:repeat(3,1fr)}.title{font-size:28px}}
@media(min-width:900px){.container{padding:48px 24px 0}.widget-grid{grid-template-columns:repeat(4,1fr)}.title{font-size:32px}}

/* ═══ ENHANCEMENTS ═══ */
.fade-in{animation:pageIn .4s ease}@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.btt{position:fixed;bottom:16px;right:16px;width:36px;height:36px;border-radius:50%;background:#0a0a0a;border:1px solid #1a1a1a;color:#888;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:99;transition:border-color .2s}.btt:hover{border-color:#555}
.eco-bar{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:6px 0;z-index:98;overflow-x:auto}.eco-bar-inner{display:flex;gap:14px;justify-content:center;padding:0 16px;white-space:nowrap}.eco-bar a{font-family:var(--jb,'JetBrains Mono',monospace);font-size:.55rem;color:#555;text-decoration:none;transition:color .15s}.eco-bar a:hover{color:#aaa}
.toolbar{display:flex;gap:8px;margin-bottom:16px}.tool-btn{font-family:var(--jb,'JetBrains Mono',monospace);font-size:9px;color:#666;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:4px 10px;cursor:pointer;transition:all .15s}.tool-btn:hover{border-color:#555;color:#aaa}
</style>
</head>
<body>
<div class="grad-bar"></div>
<div class="container">
  <div class="section"><div class="mark"></div><div class="title">Blackbox-Enterprises</div><div class="subtitle">Enterprise solutions</div></div>
  <div class="section"><div class="grid-3"><div class="card"><div class="stat-val" id="rc">...</div><div class="stat-label">Repos</div></div><div class="card"><div class="stat-val" id="lc">...</div><div class="stat-label">Languages</div></div><div class="card"><div class="stat-val" id="sc">...</div><div class="stat-label">Stars</div></div></div></div>
  <div class="section"><div class="section-label">Repositories</div><input class="search" id="q" placeholder="Search Blackbox-Enterprises repos..." oninput="fr()"><div class="card no-click" id="rl"><div style="font-family:var(--jb);font-size:10px;color:#555;padding:8px">Loading...</div></div></div>
  <div class="section"><div class="section-label">Ecosystem</div><div class="widget-grid" id="wg"></div></div>
  <div class="section" style="text-align:center"><span style="font-size:11px;color:#aaa"><span class="circle-accent pulse"></span>&nbsp; <a href="https://github.com/Blackbox-Enterprises" style="color:#aaa;text-decoration:none">github.com/Blackbox-Enterprises</a></span></div>
</div>
<div class="grad-bar" style="margin-top:24px"></div>
<script>
var ar=[];
async function lr(){var p=1,a=[];while(true){try{var r=await fetch('https://api.github.com/orgs/Blackbox-Enterprises/repos?per_page=100&sort=updated&page='+p);if(!r.ok)break;var d=await r.json();if(!d.length)break;a=a.concat(d);if(d.length<100)break;p++;}catch(e){break;}}ar=a;document.getElementById('rc').textContent=a.length;var l=new Set(),s=0;a.forEach(function(r){if(r.language)l.add(r.language);s+=r.stargazers_count||0;});document.getElementById('lc').textContent=l.size;document.getElementById('sc').textContent=s;rr(a);}
function rr(repos){document.getElementById('rl').innerHTML=repos.slice(0,60).map(function(r){var d=r.description||'';if(d.length>60)d=d.slice(0,57)+'...';return '<a href="'+r.html_url+'" target="_blank" class="repo-item"><span class="dot dot-live"></span><span class="repo-name">'+r.name+'</span><span class="repo-desc">'+d+'</span>'+(r.language?'<span class="repo-lang">'+r.language+'</span>':'')+'</a>';}).join('')||'<div style="font-family:var(--jb);font-size:10px;color:#555;padding:8px">No public repos</div>';}
function fr(){var q=document.getElementById('q').value.toLowerCase();rr(ar.filter(function(r){return r.name.toLowerCase().includes(q)||(r.description||'').toLowerCase().includes(q)||(r.language||'').toLowerCase().includes(q);}));}
lr();
var W=[{n:'Home',d:'Hub',i:'\U0001f3e0',h:'https://blackroad.io'},{n:'Chat',d:'RoundTrip',i:'\U0001f4ac',h:'https://chat.blackroad.io'},{n:'Search',d:'Search',i:'\U0001f50d',h:'https://search.blackroad.io'},{n:'GitHub',d:'Blackbox-Enterprises',i:'\u26a1',h:'https://github.com/Blackbox-Enterprises'},{n:'Company',d:'Corporate',i:'\U0001f3db',h:'https://blackroad.company'},{n:'AI',d:'Models',i:'\U0001f9e0',h:'https://blackroadai.com'},{n:'Network',d:'Mesh',i:'\U0001f310',h:'https://blackroad.network'},{n:'Systems',d:'Fleet',i:'\U0001f5a5',h:'https://blackroad.systems'}];
document.getElementById('wg').innerHTML=W.map(function(w){return '<div class="widget"><div class="widget-icon">'+w.i+'</div><div class="widget-name">'+w.n+'</div><div class="widget-desc">'+w.d+'</div><a href="'+w.h+'" target="_blank" class="widget-link"></a></div>';}).join('');
</script>

<button class="btt" id="btt" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="eco-bar"><div class="eco-bar-inner">

</div></div>

window.addEventListener('scroll',function(){document.getElementById('btt').style.display=window.scrollY>300?'flex':'none'});
document.querySelector('.ct,.container')?.classList.add('fade-in');
</script>
</body>
</html>
